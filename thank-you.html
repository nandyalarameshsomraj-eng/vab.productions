<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | VAB Productions</title>
    <meta name="description" content="Thank you for your inquiry. Our team will reach out to you shortly.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #050505;
            background-image: url('vab-hero.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .thank-you-content {
            position: relative;
            z-index: 2;
            padding: 40px;
        }

        .thank-you-title {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .thank-you-text {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>
    <section class="thank-you-section">
        <div class="hero-overlay"></div>
        <div class="container thank-you-content fade-in">
            <h1 class="thank-you-title glow-text">Thank You!</h1>
            <p class="thank-you-text">Your inquiry has been received. Our team will reach out to you shortly to discuss your vision.</p>
            <a href="index.html" class="glow-btn">Back to Home</a>
        </div>
    </section>

    <!-- GSAP for smooth entry -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from('.thank-you-content', {
                duration: 1.5,
                opacity: 0,
                y: 30,
                ease: 'power4.out'
            });
        });
    </script>
</body>

</html>
